name: Bug report
description: Site bug or API/export issue
title: "Bug: "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [site, api-export, webmcp, other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
