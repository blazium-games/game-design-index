name: Deploy GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.8'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: go run ./cmd/export -version 0.0.1
      - run: |
          mkdir -p site/public/api site/public/formats
          cp -r data/dist/api/v1 site/public/api/v1
          cp -r data/dist/formats/v1 site/public/formats/v1
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
        env:
          GITHUB_PAGES: 'true'
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
